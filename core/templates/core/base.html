<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SocialMini{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'core/css/main.css' %}" />
</head>
<body>
  {% if user.is_authenticated %}
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{% url 'feed' %}" class="nav-logo">✦ SocialMini</a>
      <div class="nav-search">
        <form action="{% url 'search' %}" method="get">
          <input type="text" name="q" placeholder="Search people, posts..." value="{{ request.GET.q }}" />
          <button type="submit">⌕</button>
        </form>
      </div>
      <div class="nav-links">
        <a href="{% url 'feed' %}" class="nav-icon {% if request.resolver_match.url_name == 'feed' %}active{% endif %}" title="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        </a>
        <a href="{% url 'explore' %}" class="nav-icon {% if request.resolver_match.url_name == 'explore' %}active{% endif %}" title="Explore">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </a>
        <a href="{% url 'profile' username=user.username %}" class="nav-avatar" title="{{ user.username }}">
          <span style="background:{{ user.profile.avatar_color|default:'#6366f1' }}">{{ user.username|first|upper }}</span>
        </a>
        <a href="{% url 'logout' %}" class="nav-icon" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </a>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="main-content {% if not user.is_authenticated %}auth-page{% endif %}">
    {% if messages %}
      {% for msg in messages %}
        <div class="toast">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'core/js/app.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
